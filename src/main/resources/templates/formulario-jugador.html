<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Registro de Jugador</title>
    <link rel="stylesheet" th:href="@{/css/fifa-style.css}">
</head>
<body>
    <div class="form-container">
        <h2>Datos del Jugador</h2>
        
        <form th:action="@{/jugadores/guardar}" th:object="${jugador}" method="post">
            <input type="hidden" th:field="*{id}">
            
            <label>Nombre Completo:</label>
            <input type="text" th:field="*{nombreCompleto}" required>

            <label>Número de Camiseta:</label>
            <input type="number" th:field="*{numeroCamiseta}" min="1" max="99" required>

            <label>Selección:</label>
            <select th:field="*{equipo.id}" required>
                <option th:each="e : ${equipos}" th:value="${e.id}" th:text="${e.nombreEquipo}"></option>
            </select>

            <label>Posición:</label>
            <select th:field="*{posicion.id}" required>
                <option th:each="pos : ${posiciones}" th:value="${pos.id}" th:text="${pos.descripcion}"></option>
            </select>

            <button type="submit" class="btn-save">Registrar Jugador</button>
            <a th:href="@{/equipos}" class="btn-cancel">Volver</a>
        </form>
    </div>
</body>
</html>
