<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro de Jugador - FIFA UMG</title>
    <link rel="stylesheet" th:href="@{/css/fifa-style.css}">
    <style>
        .form-card {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--fifa-cyan);
            border-radius: 10px;
            padding: 30px;
            max-width: 500px;
            margin: 40px auto;
            color: white;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
        }
        .form-card label {
            display: block;
            margin-bottom: 8px;
            color: var(--fifa-cyan);
            font-weight: bold;
        }
        .form-card input, .form-card select {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
            border: 1px solid #333;
            background: #111;
            color: white;
            box-sizing: border-box;
        }
        .form-card input:focus, .form-card select:focus {
            outline: none;
            border-color: var(--fifa-neon);
            box-shadow: 0 0 5px var(--fifa-neon);
        }
    </style>
</head>
<body style="background: linear-gradient(to bottom, #001a4d, #000b21); min-height: 100vh; padding: 20px;">

    <div class="main-card" style="background: transparent; border: none; box-shadow: none;">
        <div style="text-align: center; margin-bottom: 20px;">
            <div style="background: #001a4d; display: inline-block; padding: 10px 30px; border-radius: 10px; border: 1px solid var(--fifa-cyan);">
                <p style="color: white; margin: 0; font-size: 0.8rem; letter-spacing: 2px;">GESTIÓN OFICIAL DE</p>
                <h1 style="color: var(--fifa-cyan); margin: 0; font-size: 2rem; font-style: italic;">JUGADORES</h1>
            </div>
        </div>
        
        <div class="form-card">
            <h2 style="text-align: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 10px;">Datos del Jugador</h2>
            
            <form th:action="@{/jugadores/guardar}" th:object="${jugador}" method="post">
                <input type="hidden" th:field="*{id}">
                
                <label>Nombre Completo:</label>
                <input type="text" th:field="*{nombreCompleto}" required>

                <label>Número de Camiseta:</label>
                <input type="number" th:field="*{numeroCamiseta}" min="1" max="99" required>

                <label>Selección:</label>
                <select th:field="*{equipo.id}" required>
                    <option th:each="e : ${equipos}" th:value="${e.id}" th:text="${e.nombreEquipo}"></option>
                </select>

                <label>Posición:</label>
                <select th:field="*{posicion.id}" required>
                    <option th:each="pos : ${posiciones}" th:value="${pos.id}" th:text="${pos.descripcion}"></option>
                </select>

                <div style="text-align: center; margin-top: 20px; display: flex; gap: 15px; justify-content: center;">
                    <button type="submit" class="btn-fifa" style="background: var(--fifa-neon); color: black; border: none; cursor: pointer; font-size: 1rem;">Registrar Jugador</button>
                    <a th:href="@{/equipos}" class="btn-fifa" style="background: var(--fifa-red); text-decoration: none;">Volver</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
