<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Resultados - FIFA UMG</title>
    <link th:href="@{/css/fifa-style.css}" rel="stylesheet">
</head>
<body style="background: var(--fifa-dark-bg);">

    <div class="main-card" style="background: transparent; border: none; box-shadow: none; text-align: left; padding: 20px;">
        <div style="margin-bottom: 40px;">
            <a href="/" class="btn-fifa" style="background: #333; border: 1px solid #555;">← VOLVER</a>
        </div>

        <h1 style="color: white; font-style: italic; margin-left: 5%;">CALENDARIO Y RESULTADOS</h1>
        <p style="color: var(--fifa-cyan); margin-left: 5%; font-weight: bold; letter-spacing: 2px;">WORLD CUP 2026™ STADIUM FEED</p>

        <div class="results-container">
            <div th:each="p : ${encuentros}" class="match-result-card">
                
                <div class="team-name-display team-local" th:text="${p.equipoLocal.nombre}">EQUIPO A</div>
                
                <div style="text-align: center;">
                    <div class="score-display">
                        <span th:text="${p.golesLocal}">0</span>:<span th:text="${p.golesVisitante}">0</span>
                    </div>
                    <span class="match-status-tag" th:text="${p.estado}">FINALIZADO</span>
                </div>

                <div class="team-name-display team-visitante" th:text="${p.equipoVisitante.nombre}">EQUIPO B</div>
                
            </div>
        </div>
    </div>

</body>
</html>
