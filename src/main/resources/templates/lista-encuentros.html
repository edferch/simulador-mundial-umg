<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Calendario - FIFA UMG</title>
    <link th:href="@{/css/fifa-style.css}" rel="stylesheet">
</head>
<body style="background: linear-gradient(to bottom, #001a4d, #000b21); min-height: 100vh;">

    <div class="main-card" style="background: transparent; border: none; box-shadow: none; padding: 10px;">
        
        <div style="text-align: center; margin-bottom: 40px;">
            <div style="background: #001a4d; display: inline-block; padding: 10px 30px; border-radius: 10px; border: 1px solid #005B3A;">
                <p style="color: white; margin: 0; font-size: 0.8rem; letter-spacing: 2px;">CALENDARIO OFICIAL</p>
                <h1 style="color: white; margin: 0; font-size: 2.5rem; font-style: italic;">MUNDIAL 2026</h1>
            </div>
        </div>

        <div style="text-align: center; margin-bottom: 30px;">
            <form th:action="@{/simulacion/asignar-estadios}" method="post">
                <button type="submit" class="btn-fifa" style="background: var(--fifa-green); color: white;">🔄 ASIGNAR ESTADIOS ALEATORIAMENTE</button>
            </form>
        </div>

        <div class="calendar-view">
            <div th:each="partido : ${encuentros}" class="calendar-row">
                
                <div class="stadium-tag" th:text="${partido.estadio.nombre}"></div>

                <div class="teams-info-bar">
                    <div class="team-display-name" th:text="${partido.equipoLocal.nombre}">LOCAL</div>
                    
                    <div class="vs-badge">VS</div>
                    
                    <div class="team-display-name" th:text="${partido.equipoVisitante.nombre}">VISITANTE</div>
                </div>

            </div>
        </div>

        <div style="text-align: center; margin-top: 50px;">
            <a href="/" class="btn-fifa" style="background: var(--fifa-red);">REGRESAR AL MENÚ</a>
            <p style="color: var(--fifa-cyan); font-weight: bold; margin-top: 20px;">DISFRUTÁ TODOS LOS PARTIDOS POR FIFA UMG SIMULATOR</p>
        </div>
    </div>

</body>
</html>
