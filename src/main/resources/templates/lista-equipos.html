<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Selecciones Mundialistas</title>
    <link rel="stylesheet" th:href="@{/css/fifa-style.css}">
</head>
<body>
    <div class="container">
        <header>
            <h1 th:text="${equipo.nombreEquipo}">Nombre del Equipo</h1>
            <div class="nav-buttons">
                <a th:href="@{/equipos(id=${idPrev})}" class="btn-nav">← Anterior</a>
                <a th:href="@{/}" class="btn-nav">Inicio</a>
                <a th:href="@{/equipos(id=${idNext})}" class="btn-nav">Siguiente →</a>
            </div>
        </header>

        <main class="selection-detail">
            <div class="team-info">
                <p><strong>País:</strong> <span th:text="${equipo.pais.nombre}">Nombre País</span></p>
                <p><strong>Grupo:</strong> <span th:text="${equipo.grupo}">A</span></p>
                <div class="actions">
                    <a th:href="@{/equipos/editar/{id}(id=${equipo.id})}" class="btn-edit">Editar Selección</a>
                </div>
            </div>

            <section class="players-grid">
                <div th:each="j : ${jugadores}" class="player-card">
                    <div class="card-header">
                        <span class="number" th:text="${j.numeroCamiseta}">10</span>
                        <span class="pos" th:text="${j.posicion.descripcion}">DEL</span>
                    </div>
                    <h3 th:text="${j.nombreCompleto}">Nombre Jugador</h3>
                    <div class="card-footer">
                        <a th:href="@{/jugadores/editar/{id}(id=${j.id})}">⚙️</a>
                        <a th:href="@{/jugadores/eliminar/{id}(id=${j.id})}" style="color:red">X</a>
                    </div>
                </div>
                <a th:href="@{/jugadores/nuevo}" class="add-player-card">+ Añadir Jugador</a>
            </section>
        </main>
    </div>
</body>
</html>
