<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Simulador Mundial UMG</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; text-align: center; }
        table { margin: 0 auto; border-collapse: collapse; width: 80%; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; }
        th { background-color: #007bff; color: white; }
    </style>
</head>
<body>
    <h1>🏆 Lista de Selecciones Clasificadas</h1>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Abreviatura</th>
                <th>Entrenador</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="equipo : ${equipos}">
                <td th:text="${equipo.id}"></td>
                <td th:text="${equipo.nombre}"></td>
                <td th:text="${equipo.abreviatura}"></td>
                <td th:text="${equipo.entrenador}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
