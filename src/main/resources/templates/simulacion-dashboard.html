<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - FIFA UMG</title>
    <link th:href="@{/css/fifa-style.css}" rel="stylesheet">
    <style>
        .neon-title { color: var(--fifa-neon); text-shadow: 0 0 10px var(--fifa-neon); font-size: 3.5rem; margin: 0; }
        .groups-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; padding: 40px; }
        .group-card { background: rgba(18, 18, 18, 0.85); border: 2px solid rgba(209, 245, 10, 0.3); border-radius: 15px; padding: 20px; transition: 0.3s; }
        .group-card:hover { border-color: var(--fifa-neon); box-shadow: 0 0 20px rgba(209, 245, 10, 0.2); }
        .group-card h2 { background: var(--fifa-neon); color: black; padding: 5px 15px; border-radius: 5px; display: inline-block; margin-bottom: 15px; }
        
        .fifa-table { width: 100%; border-collapse: collapse; color: white; }
        .fifa-table th { color: var(--fifa-neon); border-bottom: 1px solid #444; padding: 10px; font-size: 0.8rem; }
        .fifa-table td { padding: 12px 10px; border-bottom: 1px solid #222; text-align: center; }
        .team-name { text-align: left !important; font-weight: bold; letter-spacing: 1px; }
        .pts-col { color: var(--fifa-neon); font-weight: 900; font-size: 1.2rem; }
    </style>
</head>
<body style="background: var(--fifa-dark-bg);">

    <div style="text-align: center; padding-top: 50px;">
        <h1 class="neon-title">Copa Mundial UMG 2026</h1>
        <p style="color: white; letter-spacing: 5px; opacity: 0.7;">SIMULADOR DE ALTO RENDIMIENTO</p>
        
        <div style="margin-top: 30px;">
            <form th:if="${!sorteoRealizado}" th:action="@{/simulacion/sortear}" method="post">
                <button type="submit" class="btn-fifa" style="background: gold; color: black; font-size: 1.5rem; padding: 15px 50px;">
                    REALIZAR SORTEO OFICIAL
                </button>
            </form>

            <form th:if="${sorteoRealizado and !faseGruposTerminada}" th:action="@{/simulacion/jugar-grupos}" method="post">
                <button type="submit" class="btn-fifa" style="background: var(--fifa-neon); color: black; font-size: 1.5rem; padding: 15px 50px;">
                    SIMULAR FASE DE GRUPOS ⚽
                </button>
            </form>

            <a th:if="${faseGruposTerminada}" th:href="@{/simulacion/fase-final}" class="btn-fifa" style="background: #2D23D3; color: white;">
                VER BRACKET FINAL ➔
            </a>
        </div>
        <a href="/" style="color: gray; display: block; margin-top: 20px; text-decoration: none;">← Volver al Inicio</a>
    </div>

    <div class="groups-container" th:if="${sorteoRealizado}">
        <div th:each="entry : ${tablasPosiciones}" class="group-card">
            <h2 th:text="'GRUPO ' + ${entry.key}">GRUPO A</h2>
            <table class="fifa-table">
                <thead>
                    <tr>
                        <th style="text-align: left;">SELECCIÓN</th>
                        <th>PJ</th>
                        <th>GF</th>
                        <th>DIF</th>
                        <th style="color: var(--fifa-neon);">PTS</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="pos : ${entry.value}">
                        <td class="team-name" th:text="${pos.equipo.nombreEquipo}">GUATEMALA</td>
                        <td th:text="${pos.partidosJugados}">0</td>
                        <td th:text="${pos.golesFavor}">0</td>
                        <td th:text="${pos.golesFavor - pos.golesContra}">0</td>
                        <td class="pts-col" th:text="${pos.puntos}">0</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
