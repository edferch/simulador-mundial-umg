<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Panel de Simulación - FIFA UMG</title>
    <link rel="stylesheet" th:href="@{/css/fifa-style.css}">
    <style>
        .sim-header {
            text-align: center;
            padding: 30px;
            background: rgba(0, 0, 0, 0.7);
            border-bottom: 3px solid var(--fifa-neon);
            margin-bottom: 30px;
            color: white;
        }
        .action-btn {
            padding: 15px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.2s, box-shadow 0.2s;
            margin: 10px;
        }
        .btn-sorteo { background: gold; color: black; box-shadow: 0 0 15px gold; }
        .btn-sorteo:hover { transform: scale(1.05); }
        .btn-simular { background: var(--fifa-neon); color: black; }
        .btn-simular:hover { transform: scale(1.05); }
        .btn-finales { background: #2D23D3; color: white; }

        .groups-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .group-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .group-card h3 {
            margin-top: 0;
            background: var(--fifa-dark-bg);
            color: white;
            padding: 10px;
            text-align: center;
            border-radius: 5px;
        }
        .table-pos { width: 100%; border-collapse: collapse; }
        .table-pos th, .table-pos td { padding: 8px; text-align: center; border-bottom: 1px solid #ccc; }
        .table-pos th { background: #eee; font-size: 0.9rem; }
        .table-pos .team-name { text-align: left; font-weight: bold; }
        .pts { font-weight: bold; color: #2D23D3; font-size: 1.1rem; }
    </style>
</head>
<body class="stadium-bg">
    
    <header class="sim-header">
        <h1 style="font-size: 3rem; letter-spacing: 2px;">Copa Mundial UMG 2026</h1>
        <p style="font-size: 1.2rem; margin-bottom: 20px;">Módulo de Simulación Avanzada y Big Data</p>
        
        <div class="main-actions">
            <form th:if="${!sorteoRealizado}" th:action="@{/simulacion/sortear}" method="post">
                <button type="submit" class="action-btn btn-sorteo">🏆 Realizar Sorteo Oficial 🏆</button>
            </form>

            <form th:if="${sorteoRealizado and !faseGruposTerminada}" th:action="@{/simulacion/jugar-grupos}" method="post">
                <button type="submit" class="action-btn btn-simular">⚽ Simular Fase de Grupos ⚽</button>
            </form>

            <a th:if="${faseGruposTerminada}" th:href="@{/simulacion/fase-final}" class="action-btn btn-finales">Ver Llaves Eliminatorias ➔</a>
        </div>
        
        <div style="margin-top: 15px;">
            <a th:href="@{/}" style="color: white; text-decoration: underline;">Volver al Menú Principal</a>
        </div>
    </header>

    <div class="container">
        <div class="groups-grid" th:if="${sorteoRealizado}">
            <div th:each="entry : ${tablasPosiciones}" class="group-card">
                <h3 th:text="'GRUPO ' + ${entry.key}">Grupo A</h3>
                <table class="table-pos">
                    <thead>
                        <tr>
                            <th>Equipo</th>
                            <th>PTS</th>
                            <th>PJ</th>
                            <th>GF</th>
                            <th>GC</th>
                            <th>DIF</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="pos : ${entry.value}">
                            <td class="team-name" th:text="${pos.equipo.nombreEquipo}">Equipo</td>
                            <td class="pts" th:text="${pos.puntos}">0</td>
                            <td th:text="${pos.partidosJugados}">0</td>
                            <td th:text="${pos.golesFavor}">0</td>
                            <td th:text="${pos.golesContra}">0</td>
                            <td th:text="${pos.golesFavor - pos.golesContra}" 
                                th:style="${(pos.golesFavor - pos.golesContra) > 0 ? 'color: green;' : ((pos.golesFavor - pos.golesContra) < 0 ? 'color: red;' : 'color: black;')}">0</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</body>
</html>
