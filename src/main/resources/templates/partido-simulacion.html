<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Match Day - FIFA UMG</title>
    <link th:href="@{/css/fifa-style.css}" rel="stylesheet">
</head>
<body style="background: radial-gradient(circle, #001a4d, #000);">

    <div class="main-card" style="background: transparent;">
        <div style="display: flex; justify-content: center; align-items: center; gap: 50px;">
            <h2 th:text="${encuentro.equipoLocal.nombre}" style="color: white; font-style: italic;"></h2>
            <div class="score-display" style="font-size: 5rem;" th:text="${encuentro.golesLocal + ' - ' + encuentro.golesVisitante}">0 - 0</div>
            <h2 th:text="${encuentro.equipoVisitante.nombre}" style="color: white; font-style: italic;"></h2>
        </div>

        <div style="display: grid; grid-template-columns: 280px 1fr 280px; gap: 30px; margin-top: 30px;">
            
            <div style="background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px;">
                <h4 style="color: var(--fifa-cyan);">LINEUP</h4>
                <div th:each="j : ${plantillaLocal}" style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                    <span th:text="${j.numeroCamiseta + ' ' + j.nombre}"></span>
                    <span style="color: var(--fifa-neon); font-weight: bold;" th:text="${#numbers.formatDecimal(ratings.get(j.id), 1, 1)}"></span>
                </div>
            </div>

            <div class="match-pitch">
                <div th:each="j, stat : ${plantillaLocal}" class="player-dot" 
                     th:style="|top: ${15 * stat.index + 8}%; left: 20%; background: #EA0036;|" th:text="${j.numeroCamiseta}"></div>
                <div th:each="j, stat : ${plantillaVisitante}" class="player-dot" 
                     th:style="|top: ${15 * stat.index + 8}%; right: 20%; background: #F8C301; color: black;|" th:text="${j.numeroCamiseta}"></div>
            </div>

            <div style="background: rgba(0,0,0,0.5); padding: 20px; border-radius: 8px;">
                <h4 style="color: var(--fifa-neon);">MATCH EVENTS</h4>
                <div th:each="ev : ${eventos}" style="margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px;">
                    <span th:text="${ev.minuto} + '\''" style="color: var(--fifa-cyan); font-weight: 900;"></span> ⚽
                    <span th:text="${ev.jugador.nombre}" style="color: white;"></span>
                </div>
                <div th:if="${#lists.isEmpty(eventos)}" style="color: gray;">Sin eventos registrados</div>
            </div>
        </div>

        <div style="text-align: center; margin-top: 50px;">
            <a href="/simulacion/fase-final" class="btn-fifa" style="background: white; color: black;">REGRESAR AL CUADRO</a>
        </div>
    </div>
</body>
</html>
