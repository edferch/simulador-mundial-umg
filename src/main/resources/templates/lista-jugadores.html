<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Buscador de Jugadores</title>
    <link rel="stylesheet" th:href="@{/css/fifa-style.css}">
</head>
<body>
    <div class="container">
        <h1>Buscador de Estrellas</h1>
        
        <form th:action="@{/jugadores}" method="get" class="search-box">
            <input type="text" name="buscar" placeholder="Buscar por nombre..." th:value="${param.buscar}">
            <button type="submit">Buscar</button>
        </form>

        <table class="data-table">
            <thead>
                <tr>
                    <th>Dorsal</th>
                    <th>Nombre</th>
                    <th>Posición</th>
                    <th>Equipo</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="j : ${jugadores}">
                    <td th:text="${j.numeroCamiseta}">10</td>
                    <td th:text="${j.nombreCompleto}">Nombre</td>
                    <td th:text="${j.posicion.descripcion}">Posición</td>
                    <td>
                        <a th:href="@{/equipos(id=${j.equipo.id})}" th:text="${j.equipo.nombreEquipo}">Equipo</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
