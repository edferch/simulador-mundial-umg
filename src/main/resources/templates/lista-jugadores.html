<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Plantilla de Jugadores</title>
    <style>
        body { font-family: Arial; text-align: center; }
        table { margin: 20px auto; border-collapse: collapse; width: 90%; }
        th, td { border: 1px solid #ccc; padding: 10px; }
        th { background: #343a40; color: white; }
    </style>
</head>
<body>
    <h1>📋 Jugadores Inscritos</h1>
    <table>
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Dorsal</th>
                <th>Posición</th>
                <th>Selección</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="j : ${jugadores}">
                <td th:text="${j.nombre}"></td>
                <td th:text="${j.numeroCamiseta}"></td>
                <td th:text="${j.posicion}"></td>
                <td th:text="${j.equipo.nombre}"></td> </tr>
        </tbody>
    </table>
    <br>
    <a href="/jugadores/nuevo">➕ Inscribir nuevo jugador</a>
</body>
</html>
