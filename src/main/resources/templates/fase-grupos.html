<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sorteo Oficial - Simulador 2026</title>
    <link th:href="@{/css/fifa-style.css}" rel="stylesheet">
    <style>
        .grid-grupos {
            display: grid;
            /* Crea 4 columnas para acomodar los 12 grupos perfectamente */
            grid-template-columns: repeat(4, 1fr); 
            gap: 20px;
            margin: 0 auto;
            margin-top: 30px;
        }
        .grupo-card {
            background-color: var(--fifa-light-bg);
            border: 2px solid var(--fifa-blue);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .grupo-titulo {
            text-align: center; font-size: 1.5rem; font-weight: bold; margin-bottom: 15px; color: var(--fifa-green); border-bottom: 2px solid var(--fifa-neon); padding-bottom: 5px;
        }
        .equipo-row {
            display: flex; align-items: center; margin-bottom: 10px; font-size: 1.1rem; color: var(--fifa-black); font-weight: bold;
        }
        .bandera {
            width: 30px; height: 20px; background-color: var(--fifa-neon); margin-right: 15px; display: inline-block; border-radius: 3px; border: 1px solid var(--fifa-black);
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h1>Sorteo Fase de Grupos</h1>

        <div class="grid-grupos">
            <div class="grupo-card" th:each="entrada : ${grupos}">
                <div class="grupo-titulo" th:text="'GRUPO ' + ${entrada.key}"></div>
                
                <div class="equipo-row" th:each="equipo : ${entrada.value}">
                    <div class="bandera"></div>
                    <span th:text="${equipo.nombreEquipo}"></span>
                </div>
            </div>
        </div>

        <div class="mt-20">
            <a href="/" class="btn-fifa">Volver al Inicio</a>
        </div>
    </div>

</body>
</html>
