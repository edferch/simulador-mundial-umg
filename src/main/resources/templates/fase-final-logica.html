<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Fase Final - FIFA UMG</title>
    <link th:href="@{/css/fifa-style.css}" rel="stylesheet">
</head>
<body style="background: var(--fifa-dark-bg);">

    <div class="main-card" style="background: transparent; border: none; box-shadow: none; padding: 10px;">
        
        <div style="text-align: center; margin-bottom: 30px;">
            <h1 class="bracket-title">FIFA WORLD CUP™ FINALS</h1>
            <p style="color: var(--fifa-red); font-weight: bold; letter-spacing: 5px; margin-top: -20px;">CAMINO A LA GLORIA</p>
            
            <form th:if="${!torneoTerminado}" th:action="@{/simulacion/simular-llaves}" method="post" style="margin-top: 20px;">
                <button type="submit" class="btn-fifa" style="background: var(--fifa-neon); color: black; font-size: 1.2rem; padding: 15px 40px;">
                    ▶ SIMULAR SIGUIENTE RONDA
                </button>
            </form>
            
            <div th:if="${error}" class="alert-error" style="max-width: 600px; margin: 20px auto;">
                ⚠️ <span th:text="${error}"></span>
            </div>
        </div>

        <div class="bracket-wrapper-split">
            
            <div class="bracket-side-group side-left">
                <div class="round-column">
                    <div style="text-align: center; color: #555; font-size: 0.7rem; margin-bottom: 10px; letter-spacing: 2px;">OCTAVOS IZQ</div>
                    <a th:each="p, stat : ${octavos}" th:if="${stat.index < 4}" th:href="@{/simulacion/partido/{id}(id=${p.id})}" class="match-node-link">
                        <div class="match-node-fifa" th:classappend="${p.estado.contains('FINALIZADO') ? 'node-finalized' : 'node-pending'}">
                            <div class="node-team-row">
                                <span class="node-team-name" th:text="${p.equipoLocal.abreviatura}"></span>
                                <span class="node-score" th:text="${p.golesLocal}">0</span>
                            </div>
                            <div class="node-team-row">
                                <span class="node-team-name" th:text="${p.equipoVisitante.abreviatura}"></span>
                                <span class="node-score" th:text="${p.golesVisitante}">0</span>
                            </div>
                        </div>
                    </a>
                </div>

                <div class="round-column">
                    <a th:each="p, stat : ${cuartos}" th:if="${stat.index < 2}" th:href="@{/simulacion/partido/{id}(id=${p.id})}" class="match-node-link">
                        <div class="match-node-fifa" th:classappend="${p.estado.contains('FINALIZADO') ? 'node-finalized' : 'node-pending'}">
                            <div class="node-team-row"><span th:text="${p.equipoLocal != null ? p.equipoLocal.abreviatura : '???'}"></span><span class="node-score" th:text="${p.golesLocal}">0</span></div>
                            <div class="node-team-row"><span th:text="${p.equipoVisitante != null ? p.equipoVisitante.abreviatura : '???'}"></span><span class="node-score" th:text="${p.golesVisitante}">0</span></div>
                        </div>
                    </a>
                </div>

                <div class="round-column">
                    <a th:each="p, stat : ${semis}" th:if="${stat.index == 0}" th:href="@{/simulacion/partido/{id}(id=${p.id})}" class="match-node-link">
                        <div class="match-node-fifa" th:classappend="${p.estado.contains('FINALIZADO') ? 'node-finalized' : 'node-pending'}">
                            <div class="node-team-row"><span th:text="${p.equipoLocal != null ? p.equipoLocal.abreviatura : '???'}"></span><span class="node-score" th:text="${p.golesLocal}">0</span></div>
                            <div class="node-team-row"><span th:text="${p.equipoVisitante != null ? p.equipoVisitante.abreviatura : '???'}"></span><span class="node-score" th:text="${p.golesVisitante}">0</span></div>
                        </div>
                    </a>
                </div>
            </div>

            <div class="round-column final-column">
                <div style="text-align: center; color: gold; font-weight: bold; font-size: 1.2rem; margin-bottom: 10px;">FINAL</div>
                <a th:each="p : ${finales}" th:href="@{/simulacion/partido/{id}(id=${p.id})}" class="match-node-link">
                    <div class="match-node-fifa final-match-tile">
                        <div class="node-team-row">
                            <span th:text="${p.equipoLocal != null ? p.equipoLocal.nombre : '???'}"></span>
                            <span class="node-score" th:text="${p.golesLocal}">0</span>
                        </div>
                        <div class="node-team-row">
                            <span th:text="${p.equipoVisitante != null ? p.equipoVisitante.nombre : '???'}"></span>
                            <span class="node-score" th:text="${p.golesVisitante}">0</span>
                        </div>
                    </div>
                </a>
                <div style="text-align: center; margin-top: 20px; font-size: 3rem;">🏆</div>
            </div>

            <div class="bracket-side-group side-right">
                <div class="round-column right-aligned-cols">
                    <a th:each="p, stat : ${semis}" th:if="${stat.index == 1}" th:href="@{/simulacion/partido/{id}(id=${p.id})}" class="match-node-link">
                        <div class="match-node-fifa" th:classappend="${p.estado.contains('FINALIZADO') ? 'node-finalized' : 'node-pending'}">
                            <div class="node-team-row"><span th:text="${p.equipoLocal != null ? p.equipoLocal.abreviatura : '???'}"></span><span class="node-score" th:text="${p.golesLocal}">0</span></div>
                            <div class="node-team-row"><span th:text="${p.equipoVisitante != null ? p.equipoVisitante.abreviatura : '???'}"></span><span class="node-score" th:text="${p.golesVisitante}">0</span></div>
                        </div>
                    </a>
                </div>

                <div class="round-column right-aligned-cols">
                    <a th:each="p, stat : ${cuartos}" th:if="${stat.index >= 2}" th:href="@{/simulacion/partido/{id}(id=${p.id})}" class="match-node-link">
                        <div class="match-node-fifa" th:classappend="${p.estado.contains('FINALIZADO') ? 'node-finalized' : 'node-pending'}">
                            <div class="node-team-row"><span th:text="${p.equipoLocal != null ? p.equipoLocal.abreviatura : '???'}"></span><span class="node-score" th:text="${p.golesLocal}">0</span></div>
                            <div class="node-team-row"><span th:text="${p.equipoVisitante != null ? p.equipoVisitante.abreviatura : '???'}"></span><span class="node-score" th:text="${p.golesVisitante}">0</span></div>
                        </div>
                    </a>
                </div>

                <div class="round-column right-aligned-cols">
                    <div style="text-align: center; color: #555; font-size: 0.7rem; margin-bottom: 10px; letter-spacing: 2px;">OCTAVOS DER</div>
                    <a th:each="p, stat : ${octavos}" th:if="${stat.index >= 4}" th:href="@{/simulacion/partido/{id}(id=${p.id})}" class="match-node-link">
                        <div class="match-node-fifa" th:classappend="${p.estado.contains('FINALIZADO') ? 'node-finalized' : 'node-pending'}">
                            <div class="node-team-row"><span th:text="${p.equipoLocal.abreviatura}"></span><span class="node-score" th:text="${p.golesLocal}">0</span></div>
                            <div class="node-team-row"><span th:text="${p.equipoVisitante.abreviatura}"></span><span class="node-score" th:text="${p.golesVisitante}">0</span></div>
                        </div>
                    </a>
                </div>
            </div>
        </div>

        <div th:if="${torneoTerminado}" style="margin-top: 50px; text-align: center;">
            <a href="/simulacion" class="btn-fifa">VOLVER AL PANEL</a>
        </div>
    </div>
</body>
</html>
